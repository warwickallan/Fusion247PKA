name: secret-scan

# Security finding F-02 (wp0-security-gate.md §6 hard-stop): secret scanning is
# an ENFORCED control. CI is the enforcement point; the local pre-commit hook is
# a convenience mirror of this same script.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan tracked files for secret values
        run: bash scripts/secret-scan.sh
