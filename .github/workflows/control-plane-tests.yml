name: control-plane-tests

# CI for the BUILD-014 WP-A control-plane MINIMUM Phase-0 schema
# (services/control-plane/db/migrations/001_control_plane_min_schema.sql) and its
# constraint-invariant proofs.
#
# This is a DB-GATED suite: every proof runs migration 001 into the `ops` schema of a
# throwaway Postgres and asserts the structural invariants (exact-SHA head binding, the
# merge-gate build-binding + immutability, D1 verdict-supersede invalidation, append-only
# / evidence guards, job lease/attempt bounding, etc.) as real SQL failures/successes.
#
# The runner (db/test/run-db-tests.mjs) FAILS if the child `node --test` reports 0 EXECUTED
# subtests (all-skipped) — so a mis-wired run where DATABASE_URL never reaches the test
# process can NOT go green on skips. Here we point the runner at a Postgres service
# container via REUSE_DATABASE_URL=1 so the proofs actually execute.
#
# DEV-only design artifact: this schema is never applied to any live/prod project by this
# workflow. The service container is a disposable local Postgres — no real credentials, no
# cloud project, no personal/entrusted data. Node 22 (the service's engines requirement).

on:
  push:
    paths:
      - 'services/control-plane/**'
      - '.github/workflows/control-plane-tests.yml'
  pull_request:
    paths:
      - 'services/control-plane/**'
      - '.github/workflows/control-plane-tests.yml'

permissions:
  contents: read

jobs:
  db-proofs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/control-plane
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # Throwaway CI service — not a real project, no personal data. The proofs drop and
      # recreate the `ops` schema and apply migration 001 themselves on every subtest.
      REUSE_DATABASE_URL: '1'
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (pg driver, for the live Postgres proofs)
        run: npm ci

      - name: Run the constraint-invariant proofs against real Postgres
        # `npm test` -> run-db-tests.mjs. With REUSE_DATABASE_URL=1 it runs against the
        # service container above rather than provisioning its own cluster, and it FAILS
        # on 0 executed subtests (an all-skipped run is never a pass).
        run: npm test
