name: control-plane-tests

# CI for the BUILD-014 control-plane:
#   WP-A — the MINIMUM Phase-0 schema (db/migrations/001_control_plane_min_schema.sql)
#          + its constraint-invariant proofs (db/test).
#   WP-B — the durable worker runtime + append-only event ledger over that schema
#          (worker/) + its runtime proofs (worker/test).
#
# Both are DB-GATED suites: every proof runs migration 001 into a fresh `ops` schema of a
# throwaway Postgres and asserts real behaviour as SQL/runtime successes and failures —
# WP-A the structural invariants (exact-SHA head binding, merge-gate build-binding +
# immutability, D1 verdict-supersede invalidation, append-only / evidence guards, job
# lease/attempt bounding); WP-B the runtime invariants (exactly-one claim across concurrent
# workers, crash -> reclaim -> exactly-once effect, dedup enqueue, attempts -> dead_letter,
# lifecycle reconstruction, polling-only correctness with NOTIFY disabled).
#
# Each runner (db/test/run-db-tests.mjs, worker/test/run-worker-tests.mjs) FAILS if the
# child `node --test` reports 0 EXECUTED subtests (all-skipped) — so a mis-wired run where
# DATABASE_URL never reaches the test process can NOT go green on skips. Both point at a
# Postgres service container via REUSE_DATABASE_URL=1 so the proofs actually execute.
#
# DEV-only design artifact: this schema is never applied to any live/prod project by this
# workflow. The service container is a disposable local Postgres — no real credentials, no
# cloud project, no personal/entrusted data. Node 22 (the service's engines requirement).

on:
  push:
    paths:
      - 'services/control-plane/**'
      - '.github/workflows/control-plane-tests.yml'
  pull_request:
    paths:
      - 'services/control-plane/**'
      - '.github/workflows/control-plane-tests.yml'

permissions:
  contents: read

jobs:
  db-proofs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/control-plane
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # Throwaway CI service — not a real project, no personal data. The proofs drop and
      # recreate the `ops` schema and apply migration 001 themselves on every subtest.
      REUSE_DATABASE_URL: '1'
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (pg driver, for the live Postgres proofs)
        run: npm ci

      - name: WP-A — constraint-invariant proofs against real Postgres
        # run-db-tests.mjs. With REUSE_DATABASE_URL=1 it runs against the service container
        # above rather than provisioning its own cluster, and it FAILS on 0 executed
        # subtests (an all-skipped run is never a pass).
        run: npm run test:db

      - name: WP-B — durable worker runtime + ledger proofs against real Postgres
        # run-worker-tests.mjs. Same service container + 0-executed-subtest guard. Proves
        # exactly-one claim, crash->reclaim->exactly-once effect, dedup, dead-letter,
        # lifecycle reconstruction, and polling-only correctness (NOTIFY disabled).
        run: npm run test:worker

      - name: WP-C — GitHub ingress + review handler + Fusion policy gate against real Postgres
        # run-wpc-tests.mjs. Same service container + 0-executed-subtest guard. Proves HMAC
        # fail-closed ingress + delivery-id idempotency, the baton review handler writing
        # head-bound role-correct verdicts (adapters faked in CI — the point is the
        # baton->adapter->verdict wiring + head-binding + fail-closed, not live CLIs), and the
        # Fusion policy gate reaching 'mergeable' ONLY with both head-bound approvals at the
        # CURRENT head (Outcome-C: a moved/superseded head can never report mergeable).
        run: npm run test:wpc

      - name: WP-D0 — authoritative current-head hardening against real Postgres
        # run-wpd0-tests.mjs. Same service container + 0-executed-subtest guard. Applies
        # migrations 001 + 002 and proves the two coupled head-binding gaps are structurally
        # closed: a moved-head ingress supersedes the stale live gate at the edge (no stale
        # 'mergeable'); an out-of-order evaluatePolicyGate for a non-current head is refused
        # fail-closed (no revive-old-head), including a genuine multi-connection race (no
        # deadlock); and redelivery stays convergent (monotonic head, single build_head row).
        run: npm run test:wpd0

      - name: Tower-loop — notification composer unit tests (pure, no DB)
        # notify.test.mjs (node:test). Proves the Larry-voice change: the Tower Telegram shows
        # BOTH sides of the Larry<->Codex dialogue (bounded "Larry:" excerpt + Codex verdict),
        # is length-capped, strips code fences, and stays back-compatible when no larry_response
        # is present. Pure functions, so it runs without the Postgres service.
        run: npm run test:tower-loop-unit

      - name: Tower-loop — supervisor watcher CI acceptance (deterministic doubles)
        # run-tower-loop-tests.mjs. Same Postgres service container (uses DATABASE_URL) + the
        # same 0-executed-subtest guard. Spawns the REAL watcher.mjs child processes with a
        # FAKE reviewer (canned verdicts, no Codex) and a FAKE Telegram transport (no network),
        # injected via env, and proves on the exact PR head: ingest→claim→process→verdict→notify,
        # notification dedup, restart recovery, crash-reclaim, the merge-class QA routing
        # (Tower QA skill over staged Git evidence, incl. fail-closed BLOCK), and exactly-once
        # during a long run with a concurrent watcher (lease renewal + unique(turn_id) backstop).
        # Real Codex/Telegram/Supabase acceptance stays separate (accept.mjs, run by Warwick).
        run: npm run test:tower-loop
