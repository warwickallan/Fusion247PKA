name: fusion-capture-gateway-tests

# CI for the BUILD-002 WP0 capture gateway.
#
# Three jobs:
#   * unit        — the fixtures-only suite (zero runtime dependencies, no DB,
#                   no token, no network). This is the enforced gate on every
#                   push/PR touching the service. Integration tests skip when
#                   DATABASE_URL is unset.
#   * deno-check  — validates the ACTUAL Deno edge deployment shell
#                   (supabase/functions/fcg-webhook-intake/index.ts) and its full
#                   local import graph (handler.js, derive.js, credential.js,
#                   chatBoundary.js) under a pinned Deno. `deno check` alone is
#                   the gate — NO real secrets, NO DB, NO deploy, NO Docker. It
#                   FAILS the PR on any TypeScript / import-resolution / Deno
#                   runtime incompatibility the Node suite (which only exercises
#                   the pure handler) cannot see.
#   * integration — the SAME suite with DATABASE_URL pointed at a throwaway
#                   Postgres 16 service, so the real-Postgres proofs actually run:
#                   migrations apply from a clean DB, RLS deny/allow, transactional
#                   FOR UPDATE SKIP LOCKED claim, due-retry index, retention,
#                   cascade erasure, and the full async saga end-to-end
#                   (intake -> durable row -> governed Markdown note -> evidence
#                   -> completed). No real credentials, no cloud project, no
#                   personal data — a disposable local service container only.
#
# Triggers only when the gateway service, its BUILD contract records, or this
# workflow change. Node 22 (the service's engines requirement).

on:
  push:
    paths:
      - 'services/fusion-capture-gateway/**'
      - 'supabase/**'
      - 'Builds/BUILD-002-unified-personal-capture-gateway/**'
      - '.github/workflows/fusion-capture-gateway-tests.yml'
  pull_request:
    paths:
      - 'services/fusion-capture-gateway/**'
      - 'supabase/**'
      - 'Builds/BUILD-002-unified-personal-capture-gateway/**'
      - '.github/workflows/fusion-capture-gateway-tests.yml'

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/fusion-capture-gateway
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run the fixtures-only suite (zero runtime dependencies, no DB, no token)
        run: node --test

  deno-check:
    # Validates the real Deno edge shell + its import graph. No secrets, no DB,
    # no deploy — a pure type/import gate on the deployment artifact.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up a pinned, current-supported Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.9.3

      - name: deno check the edge function shell + its full local import graph
        working-directory: supabase/functions/fcg-webhook-intake
        run: deno check index.ts

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/fusion-capture-gateway
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # Throwaway CI service — not a real project, no personal data.
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (pg, for the live Postgres adapter)
        run: npm ci

      - name: Run the full suite incl. real-Postgres integration + end-to-end
        run: node --test
